name: AI Quality CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # GitHubのSecretsから読み込む設定
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: "GALS-CI-TEST"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # --- 💡 融合したステップ：テストの直前にRenderサーバーを起こす ---
      - name: Wake up Render Server
        run: |
          echo "Renderサーバーのステータスを確認中..."
          
          # 最大12回（10秒ごとに合計2分間）ループして、サーバーが起きるのを待ちます
          for i in {1..12}; do
            # HTTPステータスコード（200など）だけを取得
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://edtech-wsqi.onrender.com/ || echo "000")
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Renderサーバーの起動を確認しました！（ステータス: $STATUS）"
              break
            else
              echo "⏳ まだ眠っています（ステータス: $STATUS）。10秒後に再確認します... ($i/12)"
              sleep 10
            fi
          done

      - name: Run Pytest
        run: |
          pytest